# ============================================================================
# tmux.conf — Catppuccin (Mocha) theme + sane, glaze-friendly keymaps
# ----------------------------------------------------------------------------
# Prefix is Ctrl+Space. Alt+arrows and Alt+hjkl are deliberately left alone so
# they stay free for the glaze WM. Everything below either lives behind the
# prefix or uses Ctrl/Shift, never bare Alt.
#
# Installed to ~/.config/tmux/tmux.conf by scripts/install_tmux.sh (needs
# tmux >= 3.1). Requires a Nerd Font in the terminal for the status-bar glyphs
# (scripts/install_nerd_font.sh).
# ============================================================================

# ---- prefix ----------------------------------------------------------------
# Ctrl+Space instead of the default Ctrl+b.
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix          # press it twice to send a literal Ctrl+Space

# ---- general behaviour -----------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-256color:Tc"  # truecolor
set -g mouse on                   # click/scroll/resize with the mouse
set -sg escape-time 10            # snappy ESC (matters for vim)
set -g history-limit 50000
set -g focus-events on
set -g display-time 2000          # message/status display 2s
set -g set-clipboard on
setw -g mode-keys vi              # vi-style keys in copy mode
set -g renumber-windows on        # keep window numbers gapless
set -g base-index 1               # windows start at 1
setw -g pane-base-index 1         # panes start at 1
set -g allow-rename off           # don't let programs rename windows
set -g detach-on-destroy off      # jump to another session, don't exit tmux

# ---- reload ----------------------------------------------------------------
bind r source-file ~/.config/tmux/tmux.conf \; display "  config reloaded"

# ---- splits & windows (path-aware) -----------------------------------------
# | and - are mnemonic and don't fight the WM. New splits/windows open in the
# current pane's working directory.
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ---- pane navigation (prefix + vim keys) -----------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ---- pane resize (prefix + Shift+vim, repeatable) --------------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r m resize-pane -Z          # (m)aximize / zoom toggle

# ---- window navigation -----------------------------------------------------
# Shift+arrows switch windows with no prefix (Alt is reserved for glaze).
bind -n S-Left  previous-window
bind -n S-Right next-window
# prefix + Tab cycles the last two windows
bind Tab last-window

# ---- copy mode (vi) --------------------------------------------------------
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind P paste-buffer
# On WSL, pipe yanked text straight into the Windows clipboard.
if-shell 'command -v clip.exe >/dev/null 2>&1' \
  'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "clip.exe"'

# ---- misc quality-of-life --------------------------------------------------
bind x kill-pane
bind X kill-window
bind Space next-layout            # prefix twice = cycle layouts

# ============================================================================
# Catppuccin — Mocha (self-contained, no plugin required)
# Palette: https://github.com/catppuccin/catppuccin
# ============================================================================
thm_bg="#1e1e2e"
thm_fg="#cdd6f4"
thm_surface0="#313244"
thm_surface1="#45475a"
thm_overlay0="#6c7086"
thm_blue="#89b4fa"
thm_mauve="#cba6f7"
thm_green="#a6e3a1"
thm_peach="#fab387"
thm_red="#f38ba8"

set -g mode-style "fg=$thm_bg,bg=$thm_mauve"
set -g message-style "fg=$thm_fg,bg=$thm_surface0"
set -g message-command-style "fg=$thm_fg,bg=$thm_surface0"

# pane borders
set -g pane-border-style "fg=$thm_surface0"
set -g pane-active-border-style "fg=$thm_mauve"
set -g display-panes-active-colour "$thm_mauve"
set -g display-panes-colour "$thm_surface1"

# clock
set -g clock-mode-colour "$thm_mauve"

# ---- status bar ------------------------------------------------------------
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=$thm_bg,fg=$thm_fg"
set -g status-left-length 100
set -g status-right-length 100

# Left: session name in a rounded mauve capsule.  = session,  = rounded cap
set -g status-left "#[fg=$thm_bg,bg=$thm_mauve,bold]   #S #[fg=$thm_mauve,bg=$thm_bg]#[default] "

# Window list: rounded segments; active window highlighted in blue.
setw -g window-status-separator " "
setw -g window-status-format "#[fg=$thm_surface1,bg=$thm_bg]#[fg=$thm_fg,bg=$thm_surface1] #I #[fg=$thm_overlay0]#W #[fg=$thm_surface1,bg=$thm_bg]"
setw -g window-status-current-format "#[fg=$thm_blue,bg=$thm_bg]#[fg=$thm_bg,bg=$thm_blue,bold] #I #[fg=$thm_bg,bg=$thm_blue]#W #[fg=$thm_blue,bg=$thm_bg]"
setw -g window-status-activity-style "fg=$thm_peach,bg=$thm_bg"

# Right: a "prefix active" flag, host, then date/time — each its own capsule.
#  = host,  = clock,  = pinned/prefix
set -g status-right "\
#{?client_prefix,#[fg=$thm_red#,bg=$thm_bg]#[fg=$thm_bg#,bg=$thm_red#,bold]  #[fg=$thm_red#,bg=$thm_bg] ,}\
#[fg=$thm_surface0,bg=$thm_bg]#[fg=$thm_fg,bg=$thm_surface0]  #h #[fg=$thm_surface0,bg=$thm_bg]\
 #[fg=$thm_green,bg=$thm_bg]#[fg=$thm_bg,bg=$thm_green,bold]  %a %d %b #[fg=$thm_fg]%H:%M #[fg=$thm_green,bg=$thm_bg]#[default]"

# ============================================================================
# Plugins (TPM) — optional. The theme above works with or without these.
# Installed headlessly by scripts/install_tmux.sh.
# ============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'   # unobtrusive sane defaults
set -g @plugin 'tmux-plugins/tmux-yank'       # copy to the system clipboard
set -g @plugin 'tmux-plugins/tmux-resurrect'  # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'  # auto-save sessions periodically

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# Initialise TPM (keep this line last). Guarded so a missing TPM doesn't error.
if-shell "test -d ~/.tmux/plugins/tpm" "run '~/.tmux/plugins/tpm/tpm'"
